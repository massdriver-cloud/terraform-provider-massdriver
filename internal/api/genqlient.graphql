# INSTANCE ALARMS
#
# v1.3 of the provider uses these GraphQL instance_alarm operations to back
# the deprecated `massdriver_package_alarm` resource. The package alarm REST
# endpoint has been removed from the server, so all CRUD goes through
# GraphQL. Provider v2.0 will remove `massdriver_package_alarm` in favor of
# `massdriver_instance_alarm`, which uses the same operations directly.

# @genqlient(for: "Alarm.metric", pointer: true)
query getInstanceAlarm(
  $organizationId: ID!,
  $id: UUID!
) {
  instanceAlarm(organizationId: $organizationId, id: $id) {
    id
    displayName
    cloudResourceId
    comparisonOperator
    threshold
    period
    metric {
      namespace
      name
      statistic
      region
      dimensions {
        name
        value
      }
    }
  }
}

# listInstanceAlarms is used by the package_alarm self-heal path: when a user
# has lost the alarm's UUID from state (a pre-1.3 deploy with the dead REST
# endpoint silently cleared it), we can recover by listing alarms on the
# instance and matching by cloudResourceId client-side. The schema's filter
# doesn't expose cloudResourceId directly, so we filter by instanceId and
# walk the page items.
#
# Every InstanceAlarmsFilter field needs `omitempty: true, pointer: true` —
# otherwise unset fields marshal as bare empty objects (`"projectId": {}`),
# which the server interprets as a filter present-but-matching-nothing and
# silently returns zero items. The instance-only filter we want has to come
# across the wire as `{"instanceId": {"eq": "..."}}` with no sibling keys.
# @genqlient(for: "Alarm.metric", pointer: true)
# @genqlient(for: "InstanceAlarmsFilter.projectId", omitempty: true, pointer: true)
# @genqlient(for: "InstanceAlarmsFilter.environmentId", omitempty: true, pointer: true)
# @genqlient(for: "InstanceAlarmsFilter.componentId", omitempty: true, pointer: true)
# @genqlient(for: "InstanceAlarmsFilter.instanceId", omitempty: true, pointer: true)
# @genqlient(for: "InstanceAlarmsFilter.ociRepoName", omitempty: true, pointer: true)
# @genqlient(for: "IdFilter.eq", omitempty: true)
# @genqlient(for: "IdFilter.in", omitempty: true)
# @genqlient(for: "OciRepoNameFilter.eq", omitempty: true)
# @genqlient(for: "OciRepoNameFilter.in", omitempty: true)
# @genqlient(for: "OciRepoNameFilter.startsWith", omitempty: true)
query listInstanceAlarms(
  $organizationId: ID!,
  # @genqlient(omitempty: true, pointer: true)
  $filter: InstanceAlarmsFilter,
  # @genqlient(omitempty: true, pointer: true)
  $cursor: Cursor
) {
  instanceAlarms(organizationId: $organizationId, filter: $filter, cursor: $cursor) {
    cursor {
      next
    }
    items {
      id
      displayName
      cloudResourceId
      comparisonOperator
      threshold
      period
      metric {
        namespace
        name
        statistic
        region
        dimensions {
          name
          value
        }
      }
    }
  }
}

# @genqlient(for: "Alarm.metric", pointer: true)
# @genqlient(for: "CreateInstanceAlarmInput.comparisonOperator", omitempty: true)
# @genqlient(for: "CreateInstanceAlarmInput.threshold", omitempty: true, pointer: true)
# @genqlient(for: "CreateInstanceAlarmInput.period", omitempty: true, pointer: true)
# @genqlient(for: "CreateInstanceAlarmInput.metric", omitempty: true, pointer: true)
# @genqlient(for: "AlarmMetricInput.namespace", omitempty: true)
# @genqlient(for: "AlarmMetricInput.name", omitempty: true)
# @genqlient(for: "AlarmMetricInput.statistic", omitempty: true)
# @genqlient(for: "AlarmMetricInput.region", omitempty: true)
# @genqlient(for: "AlarmMetricInput.dimensions", omitempty: true)
mutation createInstanceAlarm(
  $organizationId: ID!,
  $instanceId: ID!,
  $input: CreateInstanceAlarmInput!
) {
  createInstanceAlarm(
    organizationId: $organizationId,
    instanceId: $instanceId,
    input: $input
  ) {
    result {
      id
      displayName
      cloudResourceId
      comparisonOperator
      threshold
      period
      metric {
        namespace
        name
        statistic
        region
        dimensions {
          name
          value
        }
      }
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

# @genqlient(for: "Alarm.metric", pointer: true)
# @genqlient(for: "UpdateInstanceAlarmInput.cloudResourceId", omitempty: true)
# @genqlient(for: "UpdateInstanceAlarmInput.comparisonOperator", omitempty: true)
# @genqlient(for: "UpdateInstanceAlarmInput.displayName", omitempty: true)
# @genqlient(for: "UpdateInstanceAlarmInput.threshold", omitempty: true, pointer: true)
# @genqlient(for: "UpdateInstanceAlarmInput.period", omitempty: true, pointer: true)
# @genqlient(for: "UpdateInstanceAlarmInput.metric", omitempty: true, pointer: true)
mutation updateInstanceAlarm(
  $organizationId: ID!,
  $id: UUID!,
  $input: UpdateInstanceAlarmInput!
) {
  updateInstanceAlarm(
    organizationId: $organizationId,
    id: $id,
    input: $input
  ) {
    result {
      id
      displayName
      cloudResourceId
      comparisonOperator
      threshold
      period
      metric {
        namespace
        name
        statistic
        region
        dimensions {
          name
          value
        }
      }
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

mutation deleteInstanceAlarm($organizationId: ID!, $id: UUID!) {
  deleteInstanceAlarm(organizationId: $organizationId, id: $id) {
    result {
      id
      displayName
    }
    successful
    messages {
      code
      field
      message
    }
  }
}
