# COMPONENTS

# @genqlient(for: "ComponentsFilter.id", omitempty: true, pointer: true)
# @genqlient(for: "ComponentsFilter.ociRepoName", omitempty: true, pointer: true)
# @genqlient(for: "IdFilter.eq", omitempty: true)
# @genqlient(for: "IdFilter.in", omitempty: true)
# @genqlient(for: "OciRepoNameFilter.eq", omitempty: true)
# @genqlient(for: "OciRepoNameFilter.in", omitempty: true)
# @genqlient(for: "OciRepoNameFilter.startsWith", omitempty: true)
query listComponents(
  $organizationId: ID!,
  $projectId: ID!,
  # @genqlient(omitempty: true, pointer: true)
  $filter: ComponentsFilter
) {
  project(organizationId: $organizationId, id: $projectId) {
    blueprint {
      components(filter: $filter) {
        items {
          id
          name
          description
          attributes
          ociRepo {
            id
            name
          }
        }
      }
    }
  }
}

# @genqlient(for: "AddComponentInput.description", omitempty: true)
# @genqlient(for: "AddComponentInput.attributes", omitempty: true)
mutation addComponent(
  $organizationId: ID!,
  $projectId: ID!,
  $ociRepoName: OciRepoName!,
  $input: AddComponentInput!
) {
  addComponent(
    organizationId: $organizationId,
    projectId: $projectId,
    ociRepoName: $ociRepoName,
    input: $input
  ) {
    result {
      id
      name
      description
      attributes
      ociRepo {
        id
        name
      }
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

# @genqlient(for: "UpdateComponentInput.name", omitempty: true)
# @genqlient(for: "UpdateComponentInput.description", omitempty: true)
# @genqlient(for: "UpdateComponentInput.attributes", omitempty: true)
mutation updateComponent(
  $organizationId: ID!,
  $id: ID!,
  $input: UpdateComponentInput!
) {
  updateComponent(organizationId: $organizationId, id: $id, input: $input) {
    result {
      id
      name
      description
      attributes
      ociRepo {
        id
        name
      }
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

mutation removeComponent($organizationId: ID!, $id: ID!) {
  removeComponent(organizationId: $organizationId, id: $id) {
    result {
      id
      name
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

# @genqlient(for: "LinksFilter.fromComponentId", omitempty: true, pointer: true)
# @genqlient(for: "LinksFilter.toComponentId", omitempty: true, pointer: true)
query listLinks(
  $organizationId: ID!,
  $projectId: ID!,
  # @genqlient(omitempty: true, pointer: true)
  $filter: LinksFilter
) {
  project(organizationId: $organizationId, id: $projectId) {
    blueprint {
      links(filter: $filter) {
        items {
          id
          fromField
          toField
          fromComponent {
            id
            name
          }
          toComponent {
            id
            name
          }
        }
      }
    }
  }
}

mutation linkComponents($organizationId: ID!, $input: LinkComponentsInput!) {
  linkComponents(organizationId: $organizationId, input: $input) {
    result {
      id
      fromField
      toField
      fromComponent {
        id
        name
      }
      toComponent {
        id
        name
      }
    }
    successful
    messages {
      code
      field
      message
    }
  }
}

mutation unlinkComponents($organizationId: ID!, $id: UUID!) {
  unlinkComponents(organizationId: $organizationId, id: $id) {
    result {
      id
      fromField
      toField
    }
    successful
    messages {
      code
      field
      message
    }
  }
}


