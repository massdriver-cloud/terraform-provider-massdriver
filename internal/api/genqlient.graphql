# INSTANCE ALARMS

# @genqlient(for: "Alarm.metric", pointer: true)
query getInstanceAlarm(
  $organizationId: ID!,
  $id: UUID!
) {
  instanceAlarm(organizationId: $organizationId, id: $id) {
    id
    displayName
    cloudResourceId
    comparisonOperator
    threshold
    period
    metric {
      namespace
      name
      statistic
      region
      dimensions {
        name
        value
      }
    }
  }
}

