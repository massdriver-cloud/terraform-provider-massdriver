name: Lint

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false # the lint action manages its own cache

      - uses: golangci/golangci-lint-action@v8
        with:
          # Pinned to a known-good v2.x; v8 of the action requires v2.1.0+.
          # Bump in lockstep with the version in the Makefile's `lint` target.
          version: v2.1.6
