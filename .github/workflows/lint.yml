name: Lint

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false # the lint action manages its own cache

      - uses: golangci/golangci-lint-action@v6
        with:
          # Pinned to match the version configured in .golangci.yml's schema.
          version: v1.62.2
